name: Release

on:
  push:
    branches: [main]
    paths:
      - "server.json"

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.check.outputs.created }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from server.json
        id: version
        run: |
          VERSION=$(jq -r '.version' server.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get previous tag
        if: steps.check.outputs.created == 'true'
        id: prev
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$PREV" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        if: steps.check.outputs.created == 'true'
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          PREV="${{ steps.prev.outputs.tag }}"

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "body<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s (%h)" --no-merges
            echo ""
            echo ""
            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${TAG}"
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.body }}"

      - name: Update CHANGELOG.md
        if: steps.check.outputs.created == 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          DATE=$(date +%Y-%m-%d)
          PREV="${{ steps.prev.outputs.tag }}"

          if [ -n "$PREV" ]; then
            RANGE="${PREV}..HEAD~1"
          else
            RANGE="HEAD~1"
          fi

          ENTRIES=$(git log "$RANGE" --pretty=format:"- %s" --no-merges)

          # Build new entry
          NEW_ENTRY="## [$TAG] — $DATE

          $ENTRIES"

          if [ -f CHANGELOG.md ]; then
            # Insert after the header line
            awk -v entry="$NEW_ENTRY" '
              /^# Changelog/ { print; print ""; print entry; next }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo ""
              echo "$NEW_ENTRY"
            } > CHANGELOG.md
          fi

      - name: Commit CHANGELOG.md
        if: steps.check.outputs.created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "Update CHANGELOG.md for ${{ steps.version.outputs.tag }}"
          git push

  publish-npm:
    name: Publish npm
    needs: release
    if: needs.release.outputs.created == 'true'
    uses: ./.github/workflows/publish-npm.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write

  publish-pypi:
    name: Publish PyPI
    needs: release
    if: needs.release.outputs.created == 'true'
    uses: ./.github/workflows/publish-pypi.yml
    secrets: inherit
    permissions:
      contents: read
      id-token: write
